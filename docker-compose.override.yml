  # ---------------------------------------------------------------------------
  # oversight-service
  # ---------------------------------------------------------------------------
  oversight-service:
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/marketplace
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false

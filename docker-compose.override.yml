# =============================================================================
# LOCAL DEVELOPMENT OVERRIDE
# =============================================================================
# Docker Compose automatically merges this file with docker-compose.yml
# when you run `docker compose up` — no extra flags needed.
#
# Purpose: Wire every backend service to the LOCAL postgres container
# via PgBouncer (transaction-mode connection pooler) instead of a cloud
# database (Neon, etc.).
#
# Connection flow (local):
#   Service pool (max 10)  →  pgbouncer:5432  →  postgres:5432
#   pgbouncer: max_client_conn=200, pool_size=25 backend connections
#   postgres: max_connections=200 (raised from default 100)
#
# For production / cloud builds, run WITHOUT this file:
#   docker compose -f docker-compose.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PgBouncer — transaction-mode pooler in front of local postgres.
  # All backend services connect here (port 5432 on the pgbouncer container)
  # instead of connecting to postgres directly.
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: marketplace-pgbouncer
    restart: unless-stopped
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres_dev_only
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=marketplace
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=25
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=3
      - SERVER_RESET_QUERY=DISCARD ALL
      - AUTH_TYPE=scram-sha-256
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
      - LOG_CONNECTIONS=0
      - LOG_DISCONNECTIONS=0
      - STATS_PERIOD=60
    ports:
      - "5433:5432"
    networks:
      - marketplace-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # identity-service
  # ---------------------------------------------------------------------------
  identity-service:
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_only@pgbouncer:5432/marketplace
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres_dev_only
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development
    depends_on:
      pgbouncer:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # marketplace-service
  # ---------------------------------------------------------------------------
  marketplace-service:
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_only@pgbouncer:5432/marketplace
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres_dev_only
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development
    depends_on:
      pgbouncer:
        condition: service_healthy
      identity-service:
        condition: service_started

  # ---------------------------------------------------------------------------
  # payment-service
  # ---------------------------------------------------------------------------
  payment-service:
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_only@pgbouncer:5432/marketplace
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres_dev_only
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development
    depends_on:
      pgbouncer:
        condition: service_healthy
      identity-service:
        condition: service_started
      comms-service:
        condition: service_started

  # ---------------------------------------------------------------------------
  # comms-service
  # ---------------------------------------------------------------------------
  comms-service:
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_only@pgbouncer:5432/marketplace
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres_dev_only
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development
    depends_on:
      pgbouncer:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # oversight-service
  # ---------------------------------------------------------------------------
  oversight-service:
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_only@pgbouncer:5432/marketplace
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres_dev_only
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development
    depends_on:
      pgbouncer:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # infrastructure-service
  # ---------------------------------------------------------------------------
  infrastructure-service:
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_dev_only@pgbouncer:5432/marketplace
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres_dev_only
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development
    depends_on:
      pgbouncer:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # api-gateway
  # ---------------------------------------------------------------------------
  # Host port configured via API_GATEWAY_PORT in .env (default: 3700)
  # Set to 3800 to avoid Windows Hyper-V excluded port range


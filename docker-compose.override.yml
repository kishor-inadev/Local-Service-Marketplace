# =============================================================================
# LOCAL DEVELOPMENT OVERRIDE
# =============================================================================
# Docker Compose automatically merges this file with docker-compose.yml
# when you run `docker compose up` — no extra flags needed.
#
# Purpose: Wire every backend service to the LOCAL postgres container directly.
# For production / cloud builds, run WITHOUT this file:
#   docker compose -f docker-compose.yml up -d
#
# PgBouncer is available but OPT-IN via the 'pooling' profile:
#   COMPOSE_PROFILES=workers,pooling   ← enables PgBouncer
#   COMPOSE_PROFILES=workers           ← skips PgBouncer (default, saves ~30MB RAM)
#
# PgBouncer is only worth enabling for load testing or staging (50+ concurrent users).
# For a single local dev user, connecting directly to postgres is faster and simpler.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PgBouncer — transaction-mode pooler (opt-in via 'pooling' profile)
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: marketplace-pgbouncer
    restart: unless-stopped
    profiles:
      - pooling
      - scaling
      - full
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=marketplace
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=25
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=3
      - SERVER_RESET_QUERY=DISCARD ALL
      - AUTH_TYPE=scram-sha-256
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
      - LOG_CONNECTIONS=0
      - LOG_DISCONNECTIONS=0
      - STATS_PERIOD=60
    ports:
      - "5433:5432"
    networks:
      - marketplace-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  # ---------------------------------------------------------------------------
  # identity-service — connect directly to postgres for local dev
  # ---------------------------------------------------------------------------
  identity-service:
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/marketplace
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development

  # ---------------------------------------------------------------------------
  # marketplace-service
  # ---------------------------------------------------------------------------
  marketplace-service:
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/marketplace
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development

  # ---------------------------------------------------------------------------
  # payment-service
  # ---------------------------------------------------------------------------
  payment-service:
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/marketplace
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_NAME=marketplace
      - DATABASE_SSL=false
      - NODE_ENV=development

  # ---------------------------------------------------------------------------

version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "3700:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://identity-service:3001
      - USER_SERVICE_URL=http://identity-service:3001
      - REQUEST_SERVICE_URL=http://marketplace-service:3003
      - PROPOSAL_SERVICE_URL=http://marketplace-service:3003
      - JOB_SERVICE_URL=http://marketplace-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3006
      - MESSAGING_SERVICE_URL=http://comms-service:3007
      - NOTIFICATION_SERVICE_URL=http://comms-service:3007
      - REVIEW_SERVICE_URL=http://marketplace-service:3003
      - ADMIN_SERVICE_URL=http://oversight-service:3010
      - ANALYTICS_SERVICE_URL=http://oversight-service:3010
      - INFRASTRUCTURE_SERVICE_URL=http://infrastructure-service:3012
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
    networks:
      - marketplace-network
    depends_on:
      - identity-service
      - marketplace-service
      - payment-service
      - comms-service
      - oversight-service
      - infrastructure-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Example microservice reference
  # auth-service:
  #   image: auth-service:latest
  #   container_name: auth-service
  #   ports:
  #     - "3001:3001"
  #   networks:
  #     - marketplace-network

networks:
  marketplace-network:
    driver: bridge

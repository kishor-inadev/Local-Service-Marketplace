name: Release - Auto Tag & Production Deploy

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  auto-tag:
    name: Auto - Generate Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main,master
          tag_prefix: v
          major_string_token: "BREAKING CHANGE,major:"
          minor_string_token: "feat:"
          patch_string_token: "fix:,chore:,refactor:,perf:,style:,docs:,test:,build:,ci:"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.new_tag != ''
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          draft: false
          prerelease: false

  vercel-production-frontend:
    name: Vercel - Frontend Production Deploy
    runs-on: ubuntu-latest
    needs: [auto-tag]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
    steps:
      - name: Skip if Vercel not configured
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "::notice::VERCEL_TOKEN secret not configured — skipping Vercel frontend production deploy."

      - uses: actions/checkout@v4
        if: env.VERCEL_TOKEN != ''

      - uses: pnpm/action-setup@v3
        if: env.VERCEL_TOKEN != ''
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: env.VERCEL_TOKEN != ''
        with:
          node-version: 20

      - name: Deploy to Vercel (production)
        if: env.VERCEL_TOKEN != ''
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN --cwd frontend
          vercel build --prod --token=$VERCEL_TOKEN --cwd frontend
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --cwd frontend

  vercel-production-api-gateway:
    name: Vercel - API Gateway Production Deploy
    runs-on: ubuntu-latest
    needs: [auto-tag]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API_GATEWAY }}
    steps:
      - name: Skip if Vercel not configured
        if: env.VERCEL_TOKEN == '' || env.VERCEL_PROJECT_ID == ''
        run: |
          echo "::notice::VERCEL_TOKEN or VERCEL_PROJECT_ID_API_GATEWAY not configured — skipping Vercel API Gateway production deploy."

      - uses: actions/checkout@v4
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''

      - uses: pnpm/action-setup@v3
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''
        with:
          node-version: 20

      - name: Deploy to Vercel (production)
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN --cwd api-gateway
          vercel build --prod --token=$VERCEL_TOKEN --cwd api-gateway
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --cwd api-gateway

  render-deploy:
    name: "Render - Deploy (${{ matrix.service }})"
    runs-on: ubuntu-latest
    needs: [auto-tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            secret: RENDER_DEPLOY_HOOK_IDENTITY
          - service: marketplace-service
            secret: RENDER_DEPLOY_HOOK_MARKETPLACE
          - service: payment-service
            secret: RENDER_DEPLOY_HOOK_PAYMENT
          - service: comms-service
            secret: RENDER_DEPLOY_HOOK_COMMS
          - service: oversight-service
            secret: RENDER_DEPLOY_HOOK_OVERSIGHT
          - service: infrastructure-service
            secret: RENDER_DEPLOY_HOOK_INFRASTRUCTURE
    steps:
      - name: Trigger Render deploy for ${{ matrix.service }}
        env:
          DEPLOY_HOOK_URL: ${{ secrets[matrix.secret] }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "No deploy hook configured for ${{ matrix.service }} (secret: ${{ matrix.secret }}). Skipping."
            exit 0
          fi
          echo "Triggering deploy for ${{ matrix.service }}..."
          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST "$DEPLOY_HOOK_URL")
          cat /tmp/render_response.txt
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deploy triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "Deploy hook failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
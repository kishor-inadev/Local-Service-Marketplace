name: PR Check & Preview Deploy

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontend:
    name: "Frontend - Lint / Build / Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Lint
      #   run: pnpm lint

      - name: Test
        run: pnpm test --passWithNoTests --ci

      - name: Build
        run: pnpm build
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret' }}
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3700

  backend:
    name: "Backend - Build (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-service
          - marketplace-service
          - payment-service
          - comms-service
          - oversight-service
          - infrastructure-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: services/${{ matrix.service }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Lint
      #   run: pnpm run --if-present lint

      - name: Test
        run: pnpm test --passWithNoTests --ci
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build

  api-gateway:
    name: "API Gateway - Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: api-gateway/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Lint
      #   run: pnpm run --if-present lint

      - name: Test
        run: pnpm test --passWithNoTests --ci
        env:
          NODE_ENV: test

      - name: Build
        run: pnpm build

  vercel-preview-frontend:
    name: "Vercel - Frontend Preview Deploy"
    runs-on: ubuntu-latest
    needs: [frontend]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Skip if Vercel not configured
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "::notice::VERCEL_TOKEN secret not configured — skipping Vercel frontend preview deploy."

      - uses: actions/checkout@v4
        if: env.VERCEL_TOKEN != ''

      - uses: pnpm/action-setup@v3
        if: env.VERCEL_TOKEN != ''
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: env.VERCEL_TOKEN != ''
        with:
          node-version: 20

      - name: Deploy to Vercel (preview)
        id: deploy
        if: env.VERCEL_TOKEN != ''
        working-directory: frontend
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "preview-url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: steps.deploy.outputs.preview-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            const body = [
              '## Vercel Preview Deployment',
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | [${url}](${url}) |`,
              `| **Branch** | \`${{ github.head_ref }}\` |`,
              `| **Commit** | \`${{ github.event.pull_request.head.sha }}\` |`,
              '',
              '_Deployed automatically by GitHub Actions_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Vercel Preview Deployment')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  vercel-preview-backend:
    name: "Vercel - Backend Preview Deploy"
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
    steps:
      - name: Skip if Vercel not configured
        if: env.VERCEL_TOKEN == '' || env.VERCEL_PROJECT_ID == ''
        run: |
          echo "::notice::VERCEL_TOKEN or VERCEL_PROJECT_ID_BACKEND not configured — skipping backend preview deploy."

      - uses: actions/checkout@v4
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''

      - uses: pnpm/action-setup@v3
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''
        with:
          node-version: 20

      - name: Deploy to Vercel (preview)
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          vercel build --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --token=$VERCEL_TOKEN
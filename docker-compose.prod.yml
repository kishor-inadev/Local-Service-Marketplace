# =============================================================================
# Production Docker Compose
# =============================================================================
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This overlay applies production-only settings:
#   - No microservice ports exposed (only gateway:3700 and frontend:3000)
#   - Stricter resource limits
#   - restart: always (not unless-stopped)
#   - Docker secrets for sensitive values
#   - Read-only filesystems where possible
#   - Log rotation
#   - Replica counts for critical services
# =============================================================================

secrets:
  db_password:
    environment: POSTGRES_PASSWORD
  jwt_secret:
    environment: JWT_SECRET
  jwt_refresh_secret:
    environment: JWT_REFRESH_SECRET
  gateway_secret:
    environment: GATEWAY_INTERNAL_SECRET

services:
  # ─── Database ──────────────────────────────────────────────────────────────
  postgres:
    restart: always
    ports: !override []
    command:
      - "postgres"
      - "-c" 
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "ssl=off"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    restart: always
    ports: !override []
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    profiles: []
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Core Microservices (no port exposure) ────────────────────────────────
  identity-service:
    restart: always
    ports: !override []
    environment:
      - NODE_ENV=production
      - DATABASE_SSL=true
      - CACHE_ENABLED=true
      - DB_POOL_MAX=20
      - DB_POOL_MIN=5
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  marketplace-service:
    restart: always
    ports: !override []
    environment:
      - NODE_ENV=production
      - DATABASE_SSL=true
      - CACHE_ENABLED=true
      - DB_POOL_MAX=20
      - DB_POOL_MIN=5
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  payment-service:
    restart: always
    ports: !override []
    environment:
      - NODE_ENV=production
      - DATABASE_SSL=true
      - CACHE_ENABLED=true
      - WORKERS_ENABLED=true
      - DB_POOL_MAX=20
      - DB_POOL_MIN=5
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  comms-service:
    restart: always
    ports: !override []
    environment:
      - NODE_ENV=production
      - DATABASE_SSL=true
      - CACHE_ENABLED=true
      - WORKERS_ENABLED=true
      - IN_APP_NOTIFICATIONS_ENABLED=true
      - PUSH_NOTIFICATIONS_ENABLED=true
      - NOTIFICATION_PREFERENCES_ENABLED=true
      - DB_POOL_MAX=20
      - DB_POOL_MIN=5
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  oversight-service:
    restart: always
    ports: !override []
    environment:
      - NODE_ENV=production
      - DATABASE_SSL=true
      - CACHE_ENABLED=true
      - ANALYTICS_ENABLED=true
      - DB_POOL_MAX=20
      - DB_POOL_MIN=5
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 192M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  infrastructure-service:
    restart: always
    ports: !override []
    profiles: []
    environment:
      - NODE_ENV=production
      - DATABASE_SSL=true
      - CACHE_ENABLED=true
      - BACKGROUND_JOBS_ENABLED=true
      - RATE_LIMITING_ENABLED=true
      - FEATURE_FLAGS_ENABLED=true
      - DB_POOL_MAX=20
      - DB_POOL_MIN=5
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3012/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 192M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  # ─── API Gateway (only externally exposed backend) ────────────────────────
  api-gateway:
    restart: always
    ports:
      - "3700:3000"
    environment:
      - NODE_ENV=production
      - TOKEN_VALIDATION_STRATEGY=local
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=60
      - ANALYTICS_ENABLED=true
      - INFRASTRUCTURE_ENABLED=true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Kafka (enabled in production) ────────────────────────────────────────
  zookeeper:
    restart: always
    ports: !override []
    profiles: []
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  kafka:
    restart: always
    ports: !override []
    profiles: []
    environment:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

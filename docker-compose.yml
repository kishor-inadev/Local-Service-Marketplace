services:
  # Database
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: marketplace-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_only}
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # NOTE: MongoDB not needed - file-upload-service is external
  
  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    profiles:
      - scaling
      - cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: marketplace-zookeeper
    restart: unless-stopped
    profiles:
      - scaling
      - events
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - marketplace-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: marketplace-kafka
    restart: unless-stopped
    profiles:
      - scaling
      - events
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Microservices
  # identity-service: auth + user merged
  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    image: lsmp-identity-service:latest
    container_name: identity-service
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVICE_NAME=identity-service
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SSL=${DATABASE_SSL:-true}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRATION=7d
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3700/api/v1/user/auth/google/callback}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - FACEBOOK_CALLBACK_URL=${FACEBOOK_CALLBACK_URL:-http://localhost:3700/api/v1/user/auth/facebook/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - NOTIFICATION_SERVICE_URL=http://comms-service:3007
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - EVENT_BUS_ENABLED=${EVENT_BUS_ENABLED:-false}
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
      - FILE_UPLOAD_SERVICE_URL=${FILE_UPLOAD_SERVICE_URL:-https://file-upload-service-alpha.vercel.app}
      - DEFAULT_TENANT_ID=${FILE_DEFAULT_TENANT_ID:-default}
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) }).on('error', () => { process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  # marketplace-service: request + proposal + job + review merged
  marketplace-service:
    build:
      context: ./services/marketplace-service
      dockerfile: Dockerfile
    image: lsmp-marketplace-service:latest
    container_name: marketplace-service
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - SERVICE_NAME=marketplace-service
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SSL=${DATABASE_SSL:-true}
      - REDIS_URL=redis://redis:6379
      - USER_SERVICE_URL=http://identity-service:3001
      - AUTH_SERVICE_URL=http://identity-service:3001
      - NOTIFICATION_SERVICE_URL=http://comms-service:3007
      - FILE_UPLOAD_SERVICE_URL=${FILE_UPLOAD_SERVICE_URL}
      - FILE_DEFAULT_TENANT_ID=${FILE_DEFAULT_TENANT_ID:-default}
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - EVENT_BUS_ENABLED=${EVENT_BUS_ENABLED:-false}
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
    depends_on:
      identity-service:
        condition: service_healthy
      comms-service:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) }).on('error', () => { process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    image: lsmp-payment-service:latest
    container_name: payment-service
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SSL=${DATABASE_SSL:-true}
      - REDIS_URL=redis://redis:6379
      - USER_SERVICE_URL=http://identity-service:3001
      - NOTIFICATION_SERVICE_URL=http://comms-service:3007
      - FILE_UPLOAD_SERVICE_URL=${FILE_UPLOAD_SERVICE_URL}
      - FILE_DEFAULT_TENANT_ID=${FILE_DEFAULT_TENANT_ID:-default}
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - EVENT_BUS_ENABLED=${EVENT_BUS_ENABLED:-false}
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - WORKERS_ENABLED=${WORKERS_ENABLED:-false}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
      # Payment gateway selection (default: mock for local dev)
      - PAYMENT_GATEWAY=${PAYMENT_GATEWAY:-mock}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Razorpay
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      # PayPal
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - PAYPAL_API_URL=${PAYPAL_API_URL:-https://api-m.sandbox.paypal.com}
      # PayUbiz (India)
      - PAYU_KEY=${PAYU_KEY:-}
      - PAYU_SALT=${PAYU_SALT:-}
      - PAYU_SUCCESS_URL=${PAYU_SUCCESS_URL:-}
      - PAYU_FAILURE_URL=${PAYU_FAILURE_URL:-}
      - PAYU_API_URL=${PAYU_API_URL:-https://test.payu.in}
      # Instamojo (India)
      - INSTAMOJO_API_KEY=${INSTAMOJO_API_KEY:-}
      - INSTAMOJO_AUTH_TOKEN=${INSTAMOJO_AUTH_TOKEN:-}
      - INSTAMOJO_SALT=${INSTAMOJO_SALT:-}
      - INSTAMOJO_WEBHOOK_URL=${INSTAMOJO_WEBHOOK_URL:-}
      - INSTAMOJO_REDIRECT_URL=${INSTAMOJO_REDIRECT_URL:-}
      - INSTAMOJO_API_URL=${INSTAMOJO_API_URL:-https://test.instamojo.com}
    depends_on:
      identity-service:
        condition: service_healthy
      comms-service:
        condition: service_healthy
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) }).on('error', () => { process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  # comms-service: notification + messaging merged
  comms-service:
    build:
      context: ./services/comms-service
      dockerfile: Dockerfile
    image: lsmp-comms-service:latest
    container_name: comms-service
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - SERVICE_NAME=comms-service
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SSL=${DATABASE_SSL:-true}
      - REDIS_URL=redis://redis:6379
      - EMAIL_SERVICE_URL=${EMAIL_SERVICE_URL:-https://email-microservice-seven.vercel.app}
      - EMAIL_ENABLED=${EMAIL_ENABLED:-true}
      - SMS_SERVICE_URL=${SMS_SERVICE_URL:-https://sms-delivery-service.vercel.app}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - SMS_API_KEY=${SMS_API_KEY:-change-me-to-a-strong-random-secret}
      - IN_APP_NOTIFICATIONS_ENABLED=${IN_APP_NOTIFICATIONS_ENABLED:-false}
      - PUSH_NOTIFICATIONS_ENABLED=${PUSH_NOTIFICATIONS_ENABLED:-false}
      - NOTIFICATION_PREFERENCES_ENABLED=${NOTIFICATION_PREFERENCES_ENABLED:-false}
      - DEVICE_TRACKING_ENABLED=${DEVICE_TRACKING_ENABLED:-false}
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - EVENT_BUS_ENABLED=${EVENT_BUS_ENABLED:-false}
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - WORKERS_ENABLED=${WORKERS_ENABLED:-false}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
      - FILE_UPLOAD_SERVICE_URL=${FILE_UPLOAD_SERVICE_URL:-https://file-upload-service-alpha.vercel.app}
      - DEFAULT_TENANT_ID=${FILE_DEFAULT_TENANT_ID:-default}
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) }).on('error', () => { process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  # oversight-service: admin + analytics merged
  oversight-service:
    build:
      context: ./services/oversight-service
      dockerfile: Dockerfile
    image: lsmp-oversight-service:latest
    container_name: oversight-service
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - SERVICE_NAME=oversight-service
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SSL=${DATABASE_SSL:-true}
      - AUTH_SERVICE_URL=http://identity-service:3001
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - EVENT_BUS_ENABLED=${EVENT_BUS_ENABLED:-false}
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - ANALYTICS_ENABLED=${ANALYTICS_ENABLED:-true}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) }).on('error', () => { process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  infrastructure-service:
    build:
      context: ./services/infrastructure-service
      dockerfile: Dockerfile
    image: lsmp-infrastructure-service:latest
    container_name: infrastructure-service
    restart: unless-stopped
    env_file:
      - docker.env
    profiles:
      - infrastructure
      - scaling
      - full
    ports:
      - "3012:3012"
    environment:
      - NODE_ENV=production
      - PORT=3012
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_SSL=${DATABASE_SSL:-true}
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - EVENT_BUS_ENABLED=${EVENT_BUS_ENABLED:-false}
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - BACKGROUND_JOBS_ENABLED=${BACKGROUND_JOBS_ENABLED:-false}
      - RATE_LIMITING_ENABLED=${RATE_LIMITING_ENABLED:-true}
      - FEATURE_FLAGS_ENABLED=${FEATURE_FLAGS_ENABLED:-true}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}
      - DB_POOL_MIN=${DB_POOL_MIN:-5}
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3012/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) }).on('error', () => { process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # File Upload Service - External microservice (like email and SMS services)
  # NOTE: This service is deployed externally and accessed via HTTPS
  # No container needed here - configure FILE_UPLOAD_SERVICE_URL in .env

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: lsmp-api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    # API Gateway should always be available for backend services
    # profiles:
    #   - frontend
    #   - gateway
    ports:
      - "${API_GATEWAY_PORT:-3700}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET}
      - TOKEN_VALIDATION_STRATEGY=${TOKEN_VALIDATION_STRATEGY:-local}
      - AUTH_SERVICE_URL=http://identity-service:3001
      - USER_SERVICE_URL=http://identity-service:3001
      - REQUEST_SERVICE_URL=http://marketplace-service:3003
      - PROPOSAL_SERVICE_URL=http://marketplace-service:3003
      - JOB_SERVICE_URL=http://marketplace-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3006
      - MESSAGING_SERVICE_URL=http://comms-service:3007
      - NOTIFICATION_SERVICE_URL=http://comms-service:3007
      - REVIEW_SERVICE_URL=http://marketplace-service:3003
      - ADMIN_SERVICE_URL=http://oversight-service:3010
      - ANALYTICS_SERVICE_URL=http://oversight-service:3010
      - INFRASTRUCTURE_SERVICE_URL=http://infrastructure-service:3012
      - FILE_UPLOAD_SERVICE_URL=${FILE_UPLOAD_SERVICE_URL}
      - EMAIL_SERVICE_URL=${EMAIL_SERVICE_URL:-https://email-microservice-seven.vercel.app}
      - SMS_SERVICE_URL=${SMS_SERVICE_URL:-https://sms-delivery-service.vercel.app}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      # Feature Flags for Optional Services
      - ANALYTICS_ENABLED=${ANALYTICS_ENABLED:-false}
      - INFRASTRUCTURE_ENABLED=${INFRASTRUCTURE_ENABLED:-false}
    depends_on:
      identity-service:
        condition: service_healthy
      marketplace-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      comms-service:
        condition: service_healthy
      oversight-service:
        condition: service_healthy
      # Optional services (infrastructure) removed from depends_on
      # They will start independently if their profiles are enabled
    networks:
      - marketplace-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { if (r.statusCode !== 200) throw new Error(r.statusCode) }).on('error', () => { process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  # Frontend service skipped for local development

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local


networks:
  marketplace-network:
    driver: bridge

